<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | MuseumBot Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome <em>Back</em></h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div style="color: #ff4d4d; margin-bottom: 20px; font-size: 0.9rem;">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}
            
            <a href="/login/google" class="auth-btn" style="background: white; color: #333; display: flex; align-items: center; justify-content: center; text-decoration: none; margin-bottom: 25px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" style="width: 20px; margin-right: 12px;">
                Sign in with Google
            </a>
            
            <div style="margin: 0 0 25px; color: var(--text-muted); font-size: 0.8rem; position: relative;">
                <span style="background: var(--bg-card); padding: 0 10px; position: relative; z-index: 1;">OR LOGIN WITH EMAIL</span>
                <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-gold); z-index: 0;"></div>
            </div>
            
            <form class="auth-form" method="POST" action="/login">
                <input type="email" name="username" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="auth-btn">Authorize Access</button>
            </form>
            
            <div style="margin-top: 30px; font-size: 0.85rem; color: var(--text-muted);">
                New visitor? <a href="/register" style="color: var(--primary-gold); text-decoration: none;">Register here</a>
            </div>
            
            <a href="/" style="display: block; margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); text-decoration: none;">
                <i class="fa-solid fa-arrow-left"></i> Back to Homepage
            </a>
        </div>
    </div>
</body>
</html>
