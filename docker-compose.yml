services:
  museum-bot:
    build: .
    container_name: museum_ai_chatbot
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    restart: always

  nginx:
    image: nginx:latest
    container_name: museum_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    depends_on:
      - museum-bot
    restart: always

networks:
  default:
    name: museum-network
